services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: trainpipe-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./data/mlflow:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
